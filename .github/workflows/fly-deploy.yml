name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Run pytest suite with coverage
        run: python llm/run_ci_suite.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-artifacts
          path: |
            tmp_logs/coverage.xml
            tmp_logs/pytest-ci.xml

  python-quality:
    name: Black, Pylint, and Mypy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Run quality gate
        run: python llm/run_quality_gate.py

  dependency-security:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.8.0

      - name: Audit Python dependencies
        run: python -m pip_audit -r llm/requirements.txt --strict --progress-spinner off

  trivy-repo-scan:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          exit-code: "1"

      - name: Upload Trivy results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  docker-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - python-tests
      - python-quality
      - dependency-security
      - trivy-repo-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: prep
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for app image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner }}/cyberchesscoach
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata for llm API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner }}/cyberchesscoach-llm-api
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Build llm API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./llm/Dockerfile.api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=llm-api-image
          cache-to: type=gha,mode=max,scope=llm-api-image

  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - python-tests
      - python-quality
      - dependency-security
      - trivy-repo-scan
      - docker-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: fly-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy application
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - python-quality
      - dependency-security
      - trivy-repo-scan
      - docker-images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Normalize image owner
        id: prep
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Container images published for this release:
            - `ghcr.io/${{ steps.prep.outputs.owner }}/cyberchesscoach:${{ github.ref_name }}`
            - `ghcr.io/${{ steps.prep.outputs.owner }}/cyberchesscoach-llm-api:${{ github.ref_name }}`
